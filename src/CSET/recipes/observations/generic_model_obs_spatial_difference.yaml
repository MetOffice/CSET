category: Surface Spatial Observation Difference Plot
title: "$METHOD $VARNAME $SUBAREA_NAME\nDifference ($MODEL_NAME - OBS)"
description: Extracts and plot the difference in $METHOD of $VARNAME between model value and observed value for all times.


steps:
  - operator: read.read_cubes
    file_paths: $INPUT_PATHS
    model_names: ['OBS', '$MODEL_NAME']
    subarea_type: $SUBAREA_TYPE
    subarea_extent: $SUBAREA_EXTENT
    constraint: ['observed_$VARNAME', '$VARNAME']

  - operator: filters.filter_multiple_cubes
    constraint:
        operator: constraints.generate_cell_methods_constraint
        cell_methods: []

  - operator: misc.extract_common_points
    coordinate: time

  - operator: collapse.collapse
    coordinate: [time]
    method: $METHOD

  - operator: misc.subtraction
    minuend:
        operator: regrid.interpolate_to_point_cube
        fld:
            operator: filters.filter_cubes
            constraint:
                operator: constraints.combine_constraints
                var_constraint:
                    operator: constraints.generate_var_constraint
                    varname: $VARNAME
        point_cube:
            operator: filters.filter_cubes
            constraint:
                operator: constraints.generate_var_constraint
                varname: observed_$VARNAME
    subtrahend:
        operator: filters.filter_cubes
        constraint:
            operator: constraints.generate_var_constraint
            varname: observed_$VARNAME

  - operator: misc.rename_cube
    name: $VARNAME_difference

  - operator: plot.spatial_contour_plot
    sequence_coordinate: time

  - operator: write.write_cube_to_nc
    overwrite: True
