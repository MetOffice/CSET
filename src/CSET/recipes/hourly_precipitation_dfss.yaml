category: Ensemble
title: hourly Precipitation
description: |
  stuff

steps:
  - operator: read.read_cube
    file_paths: $INPUT_PATHS
    constraint:
      operator: constraints.combine_constraints
      varname_constraint:
        operator: constraints.generate_var_constraint
        varname: 'hourly_precipitation'


  - operator: filters.filter_cubes
    constraint:
      operator: constraints.generate_remove_single_ensemble_member_constraint
      ensemble_member: 0

  - operator: dfss.calculate_dfss
    neighbourhood_lengths: [1,2,3]
    centile: 90
    threshold: 10

  - operator: plot.plot_line_series_sequence
    variable: dfss
    series_coordinate: "neighbourhoods"
    sequence_coordinate: "time"

  - operator: plot.plot_line_series_sequence
    variable: dfss_stdev
    series_coordinate: "neighbourhoods"
    sequence_coordinate: "time"

  - operator: write.write_cube_to_nc
    overwrite: True
