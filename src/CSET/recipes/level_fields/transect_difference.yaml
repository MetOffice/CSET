category: Transect Difference
title: $VARNAME Transect Difference ($BASE_MODEL - $OTHER_MODEL)
description: |
  Extracts a $VERTICAL_COORDINATE transect for $VARNAME between two points and
  plots it, computing the difference between $BASE_MODEL and $OTHER_MODEL

  Start coordinate: `$START_COORDS`
  End coordinate: `$FINISH_COORDS`

steps:
  - operator: read.read_cubes
    file_paths: $INPUT_PATHS
    model_names: [$BASE_MODEL, $OTHER_MODEL]
    constraint:
        operator: constraints.combine_constraints
        cell_method_constraint:
            operator: constraints.generate_cell_methods_constraint
            cell_methods: []
        var_constraint:
            operator: constraints.generate_var_constraint
            varname: $VARNAME
        level_constraint:
            operator: constraints.generate_level_constraint
            coordinate: $VERTICAL_COORDINATE
            levels: '*'
    subarea_type: $SUBAREA_TYPE
    subarea_extent: $SUBAREA_EXTENT

  - operator: misc.extract_common_pressure_levels
    coordinate: $VERTICAL_COORDINATE

  - operator: misc.difference

  - operator: transect.calc_transect
    startcoords: $START_COORDS
    endcoords: $FINISH_COORDS

  - operator: plot.spatial_contour_plot

  - operator: write.write_cube_to_nc
    overwrite: True
