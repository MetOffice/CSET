category: Histogram
#title: "Histogram masked Nimrod $VARNAME\n$RADAR_NAME"
title: "Masked Nimrod mean times series $VARNAME\n$RADAR_NAME"
description: Timeseries of masked Nimrod radar observations.

steps:
  - operator: read.read_cubes
    file_paths: $INPUT_PATHS
#    model_names: [$RADAR_NAME, $WEIGHTS_NAME]
    model_names: $ALL_NAME
    subarea_type: $SUBAREA_TYPE
    subarea_extent: $SUBAREA_EXTENT
    constraint:
      operator: constraints.combine_constraints
#      variable_constraint:
#        operator: constraints.generate_var_constraint
#        varname: "Hourly rain accumulation"
#      variable_constraint:
#        operator: constraints.generate_var_constraint
#        varname: "Hourly wts accumulation"
      cell_methods_constraint:
        operator: constraints.generate_cell_methods_constraint
        cell_methods: []
        varname: $VARNAME
      pressure_level_constraint:
        operator: constraints.generate_level_constraint
        coordinate: pressure
        levels: []
#    constraint: ["Hourly rain accumulation", "Hourly wts accumulation"]


  - operator: radar_filter.mask_by_weights
    model_names: $RADAR_NAME
    weights_names: $WEIGHTS_NAME

  - operator: collapse.collapse
    coordinate: [projection_y_coordinate, projection_x_coordinate]
    method: MEAN

  - operator: write.write_cube_to_nc
    overwrite: True

  - operator: plot.plot_line_series
    sequence_coordinate: $SEQUENCE
