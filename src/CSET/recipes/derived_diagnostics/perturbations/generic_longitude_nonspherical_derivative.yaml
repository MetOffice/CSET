category: Derivatives
title: $MODEL_NAME d$VARNAME by dlongitude (nonspherical) $METHOD
description: |
  Creates a spatial map of the longitude derivative of $VARNAME.
  The derivative is non-spherical (so not fully accurate) of
  $VARNAME from all times in $MODEL_NAME.

steps:
  - operator: read.read_cubes
    file_paths: $INPUT_PATHS
    constraint:
      operator: constraints.combine_constraints
      varname_constraint:
        operator: constraints.generate_var_constraint
        varname: $VARNAME
      cell_methods_constraint:
        operator: constraints.generate_cell_methods_constraint
        cell_methods: []
        varname: $VARNAME
      level_constraint:
        operator: constraints.generate_level_constraint
        coordinate: "pressure"
        levels: []
    subarea_type: $SUBAREA_TYPE
    subarea_extent: $SUBAREA_EXTENT

  - operator: misc.differentiate
    coordinate: "grid_longitude"

  - operator: collapse.collapse
    coordinate: [time]
    method: $METHOD

  - operator: plot.spatial_pcolormesh_plot
    sequence_coordinate: time

  - operator: write.write_cube_to_nc
    overwrite: True
