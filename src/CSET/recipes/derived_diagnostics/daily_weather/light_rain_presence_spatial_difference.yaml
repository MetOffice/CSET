category: Daily Weather
title: "Light rain presence\nDifference ($BASE_MODEL - $OTHER_MODEL)"
description: |
  Generates a mask of whether light rain is present in a grid box and provides a
  the difference between two models. Values will be positive or negative one
  depending on which model has light rain present at that location if the other
  does not.
  Light rain is defined via the Forecasting Handbook as rainfall between 0 and 2 mm/h.

steps:
  - operator: read.read_cubes
    file_paths: $INPUT_PATHS
    model_names: [$BASE_MODEL, $OTHER_MODEL]
    constraint:
      operator: constraints.combine_constraints
      varname_constraint:
        operator: constraints.generate_var_constraint
        varname: surface_microphysical_rainfall_rate
      cell_methods_constraint:
        operator: constraints.generate_cell_methods_constraint
        cell_methods: []
    subarea_type: $SUBAREA_TYPE
    subarea_extent: $SUBAREA_EXTENT

  - operator: misc.multiplication
    multiplicand:
        operator: filters.generate_mask
        condition: 'gt'
        value: 0.0
    multiplier:
        operator: filters.generate_mask
        condition: 'lt'
        value: 2.0

  - operator: misc.rename_cube
    name: "mask_for_light_rainfall_rate"

  - operator: misc.difference

  - operator: plot.spatial_pcolormesh_plot

  - operator: write.write_cube_to_nc
    overwrite: True
