################################################################################
# Observations
################################################################################

[ns=Observations]
sort-key=sec-d
title=Observations

################################################################
# Surface synoptic fields.
[ns=Observations/Synoptic]
sort-key=sec-d2
title=Synoptic observations

[template variables=SURFACE_SYNOP_OBS]
ns=Observations/Synoptic
description=Compare with surface synoptic observations
type=python_boolean
compulsory=true
sort-key=0synop1a
trigger=template variables=SURFACE_SYNOP_FIELDS: True;
        template variables=USE_WMO_STATION_NUMBERS: True;
        template variables=SURFACE_SYNOP_INTERVAL: True;
        template variables=SURFACE_SYNOP_OFFSET: True;
        template variables=SURFACE_SYNOP_DIFFS: True;

[template variables=SURFACE_SYNOP_FIELDS]
ns=Observations/Synoptic
title=Surface synoptic observations
description=Synoptic observations
help=Name of field in the style of the MetDB.
compulsory=true
type=python_list
sort-key=0synop1b

[template variables=SURFACE_SYNOP_DIFFS]
ns=Observations/Synoptic
description=Calculate the corresponding differences.
type=python_boolean
compulsory=true
sort-key=0synop1c
trigger=template variables=SURFACE_SYNOP_MODEL_FIELDS: True;

[template variables=SURFACE_SYNOP_MODEL_FIELDS]
ns=Observations/Synoptic
title=Corresponding model variables
description=Synoptic observations
help=Name of field in the model: the order must match that of the synoptic observations
compulsory=true
type=python_list
sort-key=0synop1d

[template variables=USE_WMO_STATION_NUMBERS]
ns=Observations/Synoptic
description=Use WMO numbers
help=Select to set stations by WMO station or block number.
compulsory=true
type=python_boolean
sort-key=0synop1e
trigger=template variables=WMO_BLOCK_STTN_NMBRS: True;

[template variables=WMO_BLOCK_STTN_NMBRS]
ns=Observations/Synoptic
title=WMO Block or station numbers.
description=WMO numbers
help=WMO block numbers (2 digits) or station numbers (5 digits).
compulsory=true
type=python_list
sort-key=0synop1f

[template variables=SURFACE_SYNOP_INTERVAL]
ns=Observations/Synoptic
title=Interval between synoptic observations
description=Synoptic observations
help=The time interval between retrievals of synoptic observations.
compulsory=true
type=quoted
sort-key=0synop1g

[template variables=SURFACE_SYNOP_OFFSET]
ns=Observations/Synoptic
title=Offset for synoptic observations
description=Offset for observations
help=The offset of the first retrieved observations relative to the initial time.
compulsory=true
type=quoted
sort-key=0synop1h

################################################################

[ns=Observations/Radar]
sort-key=sec-e2
title=Radar observations

# Surface Nimrod radar rainfall fields.
[template variables=NIMROD_RADAR_OBS]
ns=Observations/Radar
description=Use UK Nimrod radar observations
type=python_boolean
compulsory=true
sort-key=nimrod-radar-1
trigger=template variables=NIMROD_COMP_XKM: True;
        template variables=NIMROD_COMP_1KM: True;
        template variables=NIMROD_COMP_2KM: True;

[template variables=NIMROD_COMP_XKM]
ns=Observations/Radar
title=UK Nimrod radar accumulated rainfall
description=Default UK Nimrod rainfall accumulation
help=Switch to select default gridded UK Nimrod rainfall accumulation.
compulsory=true
values="rainaccum_comp_hour", ""
value-titles=rainaccum_comp_hour, off
sort-key=nimrod-radar-3

[template variables=NIMROD_COMP_1KM]
ns=Observations/Radar
title=UK Nimrod radar accumulated rainfall 1km gridding
description=1km gridded UK Nimrod rainfall accumulation
help=Switch to select 1km gridded UK Nimrod rainfall accumulation.
compulsory=true
values="rainaccum_comp_hour_1km_cutout", ""
value-titles=rainaccum_comp_hour_1km_cutout, off
sort-key=nimrod-radar-4

[template variables=NIMROD_COMP_2KM]
ns=Observations/Radar
title=UK Nimrod radar accumulated rainfall 2km gridding
description=2km gridded UK Nimrod rainfall accumulation
help=Switch to select 2km gridded UK Nimrod rainfall accumulation.
compulsory=true
values="rainaccum_comp_hour_2km", ""
value-titles=rainaccum_comp_hour_2km, off
sort-key=nimrod-radar-5

[template variables=NIMROD_COMP_5MIN]
ns=Observations/Radar
title=UK Nimrod radar 5 minute rainfall rate
description=Gridded UK Nimrod 5 minute rainfall rate
help=Switch to select gridded UK Nimrod 5 minute rainfall rate.
compulsory=true
values="rainrate_comp_5min", ""
value-titles=rainrate_comp_5min, off
sort-key=nimrod-radar-5

