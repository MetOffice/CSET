################################################################################
# Observations
################################################################################

[ns=Observations]
sort-key=sec-d
title=Observations

################################################################
# Surface synoptic fields.
[ns=Observations/Point]
sort-key=sec-d2
title=Point (e.g. synoptic) observations

[template variables=POINT_OBS]
ns=Observations/Point
description=Compare with surface point-based observations.
            If true, SELECT_SUBAREA options are used to define regions of interest.
	    Variables to plot are set by SURFACE_FIELDS list.
type=python_boolean
compulsory=true
sort-key=0synop1a
trigger=template variables=POINT_OBS_TYPES: True;
        template variables=POINT_OBS_USE_WMO_STATION_NUMBERS: True;
	    template variables=POINT_OBS_WMO_BLOCK_STTN_NUMBERS: True;
        template variables=POINT_OBS_SYNOP_INTERVAL: True;
        template variables=POINT_OBS_SYNOP_OFFSET: True;
        template variables=POINT_OBS_SPATIAL: True;
	    template variables=POINT_OBS_MODEL_SPATIAL: True;
	    template variables=POINT_OBS_MODEL_DIFFERENCE: True;
	    template variables=POINT_OBS_MODEL_TIMESERIES: True;
	    template variables=POINT_OBS_MODEL_HISTOGRAM: True;
	    template variables=POINT_OBS_MODEL_SCATTER: True;
        template variables=POINT_OBS_MODEL_HEXBIN: True;

[template variables=POINT_OBS_TYPES]
ns=Observations/Point
title=MetDB observation types
description=List of Met Office MetDB observation database Datatype(s) to fetch and compare against.
help=Select all required Datatypes. See http://www-mdb-apps/ssot/datatypes/index.html for details (Met Office).
compulsory=true
type=python_list
sort-key=0synop1a

[template variables=POINT_OBS_USE_WMO_STATION_NUMBERS]
ns=Observations/Point
title=Select observations by WMO station numbers
description=Choose WMO block or station numbers to select point observations.
            If False (default), use any SELECT_SUBAREA settings.
help=Select to set stations by WMO station or block number.
compulsory=true
type=python_boolean
sort-key=0synop1b
trigger=template variables=POINT_OBS_WMO_BLOCK_STTN_NUMBERS: True;

[template variables=POINT_OBS_WMO_BLOCK_STTN_NUMBERS]
ns=Observations/Point
title=WMO Block or Station numbers to be selected.
description=List of WMO block numbers (2 digits) or station numbers (5 digits).
help=WMO block numbers (2 digits) or station numbers (5 digits).
compulsory=true
type=python_list
sort-key=0synop1c

[template variables=POINT_OBS_SYNOP_INTERVAL]
ns=Observations/Point
title=Interval between synoptic observations
description=e.g. for hourly data set to PT1H, for 6-hourly set to PT6H, etc.
help=The time interval between retrievals of synoptic observations.
compulsory=true
type=quoted
sort-key=0synop1d

[template variables=POINT_OBS_SYNOP_OFFSET]
ns=Observations/Point
title=Offset for synoptic observations
description=e.g. for 1-hour offset in time of first observation, set to PT1H
help=The offset of the first retrieved observations relative to the initial time.
compulsory=true
type=quoted
sort-key=0synop1e

[template variables=POINT_OBS_SPATIAL]
ns=Observations/Point
description=Create spatially mapped plots of selected point observations.
            Variables to plot are set by SURFACE_FIELDS variable list.
	        Analysis method(s) are set by SPATIAL_SURFACE_FIELD_METHOD.
type=python_boolean
compulsory=true
sort-key=0synop2

[template variables=POINT_OBS_MODEL_SPATIAL]
ns=Observations/Point
description=Create spatially mapped plots for specified surface fields with
            point observations overplotted.
	        Variables to plot are set by SURFACE_FIELDS variable list.
	        Analysis method(s) are set by SPATIAL_SURFACE_FIELD_METHOD.
type=python_boolean
compulsory=true
sort-key=0synop3

[template variables=POINT_OBS_MODEL_DIFFERENCE]
ns=Observations/Point
description=Create spatially mapped difference plots for specified surface fields.
            Variables to plot are set by SURFACE_FIELDS variable list.
	        Analysis method(s) are set by SPATIAL_SURFACE_FIELD_METHOD.
type=python_boolean
compulsory=true
sort-key=0synop4

[template variables=POINT_OBS_MODEL_TIMESERIES]
ns=Observations/Point
description=Create time series plots of specified surface fields compared with point observations.
            Variables to plot are specified by SURFACE_FIELDS variable list.
            Select all options required.
	        Option1: Single plot of model and observed, averaged across all observation points.
	        Option2: Single bias plot model - observation, averaged across all observation points.
	        Option3: Separate plots of model and observed for each point observation location.
type=python_boolean,python_boolean,python_boolean
compulsory=true
sort-key=0synop5

[template variables=POINT_OBS_MODEL_HISTOGRAM]
ns=Observations/Point
description=Create histogram plots of specified surface fields compared with point observations.
            Variables to plot are set by SURFACE_FIELDS variable list.
            Select all options required.
	        Option1: Single plot aggregated across all observation points.
	        Option2: Separate plots for each point observation location.
type=python_boolean,python_boolean
compulsory=true
sort-key=0synop6

[template variables=POINT_OBS_MODEL_SCATTER]
ns=Observations/Point
description=Create scatter plots of specified surface fields compared with point observations.
            Variables to plot are set by SURFACE_FIELDS variable list.
	        Generated scatter plots overlay results for all models on same output plot.
            Select all options required.
	        Option1: Single scatter plot aggregated across all observation points.
	        Option2: Separate scatter plots for each point observation location.
type=python_boolean,python_boolean
compulsory=true
sort-key=0synop7

[template variables=POINT_OBS_MODEL_HEXBIN]
ns=Observations/Point
description=Create frequency of data hexbin plots of specified surface fields compared with point observations.
	        Variables to plot are set by SURFACE_FIELDS variable list.
            Separate hexbin plots are generated for each model being analysed.
            Select all options required.
            Option1: Single hexbin plot for each model aggregated across all observation points.
            Option2: Separate hexbin plots for each model at each point observation location.
type=python_boolean,python_boolean
compulsory=true
sort-key=0synop8


