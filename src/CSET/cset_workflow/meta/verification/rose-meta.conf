# Scores
[Verification/Scores]
ns=Verification/Scores
sort-key=scores
title=Scores

[template variables=SCORES_SPATIAL_DIFFERENCE]
ns=Verification/Scores
description=Create spatially mapped difference plots for the specified surface fields.
            Select all spatial analysis methods required.
            Option1: Root Mean Squared Difference
            Option2: Mean Difference
            Option3: Mean Absolute Difference

            For the time coordinate, the analysis method(s) set in SPATIAL_SURFACE_FIELD_METHOD will be used.

type=python_boolean,python_boolean,python_boolean
compulsory=true
sort-key=scores1

[template variables=SCORES_DIFFERENCE_TIMESERIES]
ns=Verification/Scores
description=Create a difference timeseries for the specified surface fields.
            Select all spatial analysis methods required.
            Option1: Root Mean Squared Difference
            Option2: Mean Difference
            Option3: Mean Absolute Difference
type=python_boolean,python_boolean,python_boolean
compulsory=true
sort-key=scores2
